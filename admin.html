<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard | Military Fitness Hub</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: white;
      margin: 0;
      padding: 20px;
    }
    .user-card {
      background: #161b22;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
    button {
      padding: 8px 12px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #2ea043;
    }
  </style>
</head>

<body>

  <h1>Admin Dashboard</h1>
  <p>View all users and their fitness data</p>

  <div id="users"></div>

  <button onclick="logout()">Logout</button>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        loadAllUsers();
      }
    });

    async function loadAllUsers() {
      const usersDiv = document.getElementById("users");
      usersDiv.innerHTML = "<p>Loading users...</p>";

      const querySnapshot = await getDocs(collection(db, "users"));
      usersDiv.innerHTML = "";

      querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();

        const card = document.createElement("div");
        card.className = "user-card";

        card.innerHTML = `
          <h3>${data.name || "No name"}</h3>
          <p><strong>Email:</strong> ${data.email || "N/A"}</p>

          <h4>Profile</h4>
          <p>Age: ${data.age || "N/A"}</p>
          <p>Height: ${data.height || "N/A"}</p>
          <p>Weight: ${data.weight || "N/A"}</p>
          <p>Waist: ${data.waist || "N/A"}</p>

          <h4>PFT</h4>
          <p>3-mile run: ${data.run3mile || "N/A"}</p>
          <p>Plank: ${data.plank || "N/A"}</p>
          <p>Pull-ups: ${data.pullups || "N/A"}</p>

          <h4>CFT</h4>
          <p>MUF: ${data.muf || "N/A"}</p>
          <p>880m run: ${data.run880 || "N/A"}</p>
          <p>Ammo lifts: ${data.ammo || "N/A"}</p>

          <button onclick="alert('AI plan generation coming next')">Generate AI Plan</button>
        `;

        usersDiv.appendChild(card);
      });
    }

    function logout() {
      signOut(auth);
    }
  </script>

</body>
</html>
